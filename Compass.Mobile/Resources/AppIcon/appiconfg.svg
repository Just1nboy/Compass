<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Foreground for the adaptive icon: a compass, centred within the safe zone. -->
  <g>
    <!-- outer ring -->
    <circle cx="228" cy="228" r="120" fill="none" stroke="#FFFFFF" stroke-width="16" />
    <!-- needle: north half (red), south half (light) -->
    <polygon points="228,128 254,228 202,228" fill="#FF5257" />
    <polygon points="228,328 254,228 202,228" fill="#E7ECF3" />
    <!-- hub -->
    <circle cx="228" cy="228" r="15" fill="#FFFFFF" />
    <circle cx="228" cy="228" r="6" fill="#0F1626" />
  </g>
</svg>
